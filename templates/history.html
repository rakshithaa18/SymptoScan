<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SymptoScan History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f4f7fb;
  padding: 30px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 25px;
}

/* BACK BUTTON */
.back-btn {
  padding: 8px 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #1f7a7a, #2bb3b3);
  color: white;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}

.back-btn:hover {
  transform: translateX(-3px);
}

/* TITLE */
h2 {
  margin: 0;
  color: #1f2937;
}

/* CARD */
.card {
  background: white;
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  border-left: 5px solid #2bb3b3;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

/* TEXT */
.card h3 {
  margin-bottom: 5px;
  color: #1f2937;
}

.card p {
  color: #555;
}

.time {
  color: #9ca3af;
  font-size: 13px;
  margin-top: 5px;
}

/* EMPTY */
.empty {
  text-align: center;
  color: #777;
  margin-top: 40px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <h2>📜 User Activity History</h2>
</div>

<!-- HISTORY LIST -->
<div id="historyList"></div>

<script>

function goBack() {
  window.location.href = "/dashboard";  // ✅ change if needed
}

async function loadHistory() {

  let email = localStorage.getItem("email");

  if (!email) {
    document.getElementById("historyList").innerHTML =
      "<div class='empty'>No user logged in</div>";
    return;
  }

  try {
    let res = await fetch(`/history/${email}`);
    let data = await res.json();

    if (!data || data.length === 0) {
      document.getElementById("historyList").innerHTML =
        "<div class='empty'>No history available</div>";
      return;
    }

    let html = "";

    data.reverse().forEach(item => {
      html += `
        <div class="card">
          <h3>🧠 ${item.prediction}</h3>
          <p><b>Probability:</b> ${item.probability}%</p>
          <div class="time">${item.time || ""}</div>
        </div>
      `;
    });

    document.getElementById("historyList").innerHTML = html;

  } catch (err) {
    document.getElementById("historyList").innerHTML =
      "<div class='empty'>Error loading history</div>";
  }
}

loadHistory();

</script>

</body>
</html>
